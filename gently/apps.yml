tools:
  - nodejs_22

apps:
  web:
    port: 5173
    routes:
      - path: /
    env:
      # The API is routed same-origin under /api on every Gently sandbox.
      VITE_API_URL: "{{ gently.GENTLY_ENVIRONMENT_URL }}"
      VITE_ALLOWED_HOSTS: "{{ gently.GENTLY_DOMAIN }}"
    setup:
      - npm install
    startup:
      - npm run dev -- --config vite.config.dev.ts
    health:
      - endpoint: /
